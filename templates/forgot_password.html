{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-text-primary mb-2">forgot your password?</h2>
            <p class="text-text-accent opacity-90">no worries, we'll send you reset instructions</p>
        </div>

        <div class="dark-card rounded-2xl shadow-2xl p-8">
            <form method="POST" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-text-primary mb-2">Email Address</label>
                    <input type="email" name="email" id="email" required
                           placeholder="Enter your email address"
                           class="w-full px-4 py-3 bg-card-light border border-text-primary/30 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent transition-all text-text-primary placeholder-gray-400">
                </div>

                <button type="submit"
                        class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3 px-4 rounded-lg transition-all duration-300 shadow-xl hover:shadow-2xl transform hover:scale-105">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-6 text-center space-y-2">
                <p class="text-text-accent">Remember your password?
                    <a href="{{ url_for('login') }}" class="text-primary hover:text-accent font-semibold transition-colors">Sign in</a>
                </p>
                <p class="text-text-accent">Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-primary hover:text-accent font-semibold transition-colors">Register here</a>
                </p>
            </div>
        </div>

        <div class="dark-card rounded-xl p-4 text-center">
            <p class="text-sm text-text-accent">
                <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                If an account exists with the email you entered, you'll receive password reset instructions.
            </p>
        </div>
    </div>
</div>
{% endblock %}
