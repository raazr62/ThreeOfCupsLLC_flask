<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three of Cups - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'brand': ['Playfair Display', 'serif'],
                        'sans': ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FF9B9B',
                        secondary: '#FFB88C',
                        accent: '#FFD97D',
                        'light-bg': '#FAF7F5',
                        'text-primary': '#2C2420',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #FFD1DC 0%, #FFB88C 40%, #FFD97D 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gradient-text {
            background: linear-gradient(135deg, #FF9B9B, #FFB88C, #FFD97D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .chalice-container {
            position: relative;
            margin: 0 auto;
        }
        .chalice {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .access-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 155, 155, 0.1);
            border: none;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .access-btn:hover {
            opacity: 0.6;
        }
        .access-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .access-modal.active {
            display: flex;
        }
        .logo-img {
            width: 350px;
        }
        @media (max-width: 768px) {
            .logo-img {
                width: 200px;
            }
            h1 {
                font-size: 2.5rem !important;
            }
        }
    </style>
</head>
<body class="font-sans">
    <div class="max-w-4xl mx-auto px-4 text-center">
        <!-- Logo -->
        <div class="chalice-container">
            <img src="/static/logo/three-of-cups-logo-new.png" alt="Three of Cups Logo" class="mx-auto" style="width: 220px; filter: drop-shadow(0 0 20px rgba(255, 155, 155, 0.5));">
        </div>

        <!-- Main Content -->
        <h1 class="text-6xl md:text-7xl font-bold text-text-primary mb-6 font-brand leading-relaxed pb-2 -mt-12">
            three of cups
        </h1>

        <p class="text-2xl md:text-3xl text-text-primary mb-8 font-light">
            Coming Soon
        </p>

        <div class="max-w-md mx-auto bg-white/80 backdrop-blur-sm rounded-2xl p-8 shadow-2xl">
            <p class="text-lg text-text-primary text-center">
                a matchmaking platform where friendship can form and community can flourish
            </p>
        </div>

        <div class="mt-8 mb-8 flex flex-row items-center justify-center gap-6">
            <a href="https://instagram.com/threeofcupsllc"
               target="_blank"
               rel="noopener noreferrer"
               class="inline-flex items-center gap-2 text-text-primary hover:text-primary transition-colors"
               aria-label="Follow us on Instagram @threeofcupsllc">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                </svg>
                <span class="font-medium hidden sm:inline">@threeofcupsllc</span>
            </a>

            <a href="https://www.tiktok.com/@threeofcupsllc"
               target="_blank"
               rel="noopener noreferrer"
               class="inline-flex items-center gap-2 text-text-primary hover:text-primary transition-colors"
               aria-label="Follow us on TikTok @threeofcupsllc">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/>
                </svg>
                <span class="font-medium hidden sm:inline">@threeofcupsllc</span>
            </a>
        </div>
    </div>

    <!-- Hidden Access Button -->
    <button class="access-btn" onclick="showAccessModal()"></button>

    <!-- Access Modal -->
    <div id="accessModal" class="access-modal">
        <div class="bg-white rounded-2xl p-8 max-w-md mx-4 shadow-2xl">
            <h3 class="text-2xl font-bold text-text-primary mb-4">Beta Access</h3>
            <p class="text-gray-600 mb-6">Enter the access code to test the platform</p>

            <form method="POST" action="{{ url_for('beta_access') }}">
                <input type="password"
                       name="access_code"
                       placeholder="Access Code"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-primary"
                       required>

                <div class="flex gap-3">
                    <button type="button"
                            onclick="closeAccessModal()"
                            class="flex-1 px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors">
                        Cancel
                    </button>
                    <button type="submit"
                            class="flex-1 px-6 py-3 bg-primary text-white rounded-lg hover:bg-secondary transition-colors">
                        Access
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showAccessModal() {
            document.getElementById('accessModal').classList.add('active');
        }

        function closeAccessModal() {
            document.getElementById('accessModal').classList.remove('active');
        }

        document.getElementById('accessModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAccessModal();
            }
        });
    </script>
</body>
</html>
