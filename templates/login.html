{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-text-primary mb-2 font-brand">welcome</h2>
            <p class="text-text-accent opacity-90 font-sans">sign in to your account to continue connecting</p>
        </div>
        
        <div class="dark-card rounded-2xl shadow-2xl p-8">
            <form method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-text-primary mb-2">Username or Email</label>
                    <input type="text" name="username" id="username" required autocapitalize="off"
                           placeholder="Enter your username or email"
                           class="w-full px-4 py-3 bg-card-light border border-text-primary/30 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent transition-all text-text-primary placeholder-gray-400">
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-medium text-text-primary">Password</label>
                        <a href="{{ url_for('forgot_password') }}" class="text-sm hover:opacity-80 transition-colors" style="color: #D6653A;">Forgot password?</a>
                    </div>
                    <input type="password" name="password" id="password" required
                           class="w-full px-4 py-3 bg-card-light border border-text-primary/30 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent transition-all text-text-primary placeholder-gray-400">
                </div>

                <button type="submit"
                        class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3 px-4 rounded-lg transition-all duration-300 shadow-xl hover:shadow-2xl transform hover:scale-105">
                    Sign In
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-text-accent">Don't have an account?
                    <a href="{{ url_for('register') }}" class="font-semibold hover:opacity-80 transition-colors" style="color: #D6653A;">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
